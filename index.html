<html lang="tr">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<meta name="application-name" content="Yaz Boz">
<meta name="theme-color" content="#12022e">

  &quot;icons&quot;: [{

<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

/* ── RESPONSIVE — tüm ekranlar ── */
:root {
  --col0: clamp(48px, 14vw, 72px);
}

.player-names,
.score-row,
.total-row {
  grid-template-columns: var(--col0) repeat(4, 1fr);
}

.pname-input {
  font-size: clamp(10px, 3.2vw, 14px);
}

.round-num {
  font-size: clamp(0.6rem, 2.5vw, 0.78rem);
}

.score-cell input {
  font-size: clamp(14px, 4.5vw, 20px);
  min-height: clamp(42px, 12vw, 54px);
}

.total-cell {
  font-size: clamp(1rem, 4.5vw, 1.4rem);
}

.total-label {
  font-size: clamp(0.45rem, 1.8vw, 0.6rem);
}

/* Header */
.top h1 { font-size: clamp(1rem, 4.5vw, 1.3rem); }
.top p  { font-size: clamp(0.55rem, 2vw, 0.7rem); }

.lock-btn, .team-btn {
  min-width: clamp(40px, 12vw, 52px);
  padding: clamp(3px, 1vw, 4px) clamp(5px, 2vw, 8px);
}
.lock-btn .lock-icon,
.team-btn .team-icon { font-size: clamp(0.75rem, 3vw, 0.95rem); }
.lock-btn .lock-label,
.team-btn .team-label { font-size: clamp(0.35rem, 1.2vw, 0.42rem); }

/* Tool butonları */
.tool-btn {
  font-size: clamp(0.6rem, 2.2vw, 0.7rem) !important;
  padding: clamp(6px, 2vw, 10px) clamp(6px, 2vw, 10px) !important;
  min-width: clamp(48px, 14vw, 64px) !important;
}

/* Sıralama */
.lb-name { font-size: clamp(0.75rem, 3vw, 0.85rem); }
.lb-score-val { font-size: clamp(0.85rem, 3.5vw, 1.05rem); }

/* Add buton */
.add-btn { font-size: clamp(13px, 3.5vw, 15px); }

/* Overlay isim inputları */
#oyun-overlay input {
  font-size: clamp(13px, 3.5vw, 15px) !important;
}
#oyun-overlay button[onclick="oyunuBaslat()"] {
  font-size: clamp(17px, 5vw, 22px) !important;
  padding: clamp(14px, 4vw, 20px) clamp(20px, 6vw, 52px) !important;
}

/* Çok küçük ekranlar (320px altı) */
@media (max-width: 340px) {
  :root { --col0: 44px; }
  .score-cell input { font-size: 13px; }
  .del-btn { font-size: 0.7rem; padding: 1px 2px; }
  .pname-dot { width: 7px; height: 7px; }
}

  from { opacity:0; transform:scale(0.7); }
  to   { opacity:1; transform:scale(1); }
}
@keyframes bounce2 {
  from { transform:translateY(0) rotate(-5deg); }
  to   { transform:translateY(-10px) rotate(5deg); }
}

body {
  background: #12022e;
  min-height: 100vh;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  padding: 0 0 20px;
  color: #fff;
  position: relative;
}

#bg-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ── Header ── */
.top {
  background: rgba(26,10,62,0.85);
  backdrop-filter: blur(8px);
  padding: 12px 12px 10px;
  border-bottom: 1px solid #3d2070;
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.top-center { text-align: center; flex: 1; }
.top h1 { font-size: 1.3rem; font-weight: 700; letter-spacing: 0.05em; }
.top p  { font-size: 0.7rem; color: #9a8abb; margin-top: 2px; letter-spacing: 0.1em; text-transform: uppercase; }

.top-btns {
  display: flex; flex-direction: column; gap: 5px; align-items: center;
}

/* Kilit butonu */
.lock-btn {
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 4px 8px;
  cursor: pointer;
  touch-action: manipulation;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  transition: all 0.2s;
  min-width: 52px;
}
.lock-btn:active { background: rgba(255,255,255,0.18); }
.lock-btn .lock-icon { font-size: 0.95rem; line-height: 1; }
.lock-btn .lock-label { font-size: 0.42rem; letter-spacing: 0.08em; color: #9a8abb; text-transform: uppercase; }

/* Kilitli mod */
.lock-btn.locked { border-color: rgba(233,69,96,0.5); background: rgba(233,69,96,0.1); }
.lock-btn.locked .lock-label { color: #e94560; }

/* Düzenleme modu */
.lock-btn.unlocked { border-color: rgba(6,214,160,0.5); background: rgba(6,214,160,0.1); }
.lock-btn.unlocked .lock-label { color: #06d6a0; }

/* Kilitli modda inputlar devre dışı */
body.locked .score-cell input { pointer-events: none; }
body.locked .pname-input { pointer-events: none; }
body.locked .del-btn { pointer-events: none; opacity: 0.3; }
body.locked .add-btn { pointer-events: none; opacity: 0.4; }

/* Takım butonu */
.team-btn {
  background: rgba(255,255,255,0.08);
  border: 1.5px solid rgba(255,255,255,0.15);
  border-radius: 8px;
  padding: 4px 8px;
  cursor: pointer;
  touch-action: manipulation;
  display: flex; flex-direction: column; align-items: center; gap: 1px;
  transition: all 0.2s;
  min-width: 52px;
}
.team-btn:active { background: rgba(255,255,255,0.18); }
.team-btn .team-icon { font-size: 0.95rem; line-height: 1; }
.team-btn .team-label { font-size: 0.42rem; letter-spacing: 0.08em; color: #9a8abb; text-transform: uppercase; }
.team-btn.on { border-color: rgba(0,180,216,0.5); background: rgba(0,180,216,0.1); }
.team-btn.on .team-label { color: #00b4d8; }

/* Takımlı mod - header alt çizgisi */
body.team-mode .player-names { position: relative; z-index: 1; border-bottom: 2px solid #ffd700; }

/* Takım renkleri - oyuncu isimleri arka planı */
body.team-mode .pname-cell.pi0,
body.team-mode .pname-cell.pi1 { background: rgba(255,63,91,0.15); border-bottom: 2px solid #ff3f5b; }
/* Takımlar arası dikey kırmızı çizgi kaldırıldı */
body.team-mode .score-cell.pi1 { border-right: none !important; box-shadow: inset 4px 0 10px rgba(255,63,91,0.15), inset -4px 0 10px rgba(255,63,91,0.08) !important; }
body.team-mode .pname-cell.pi1 { border-right: none !important; }

body.team-mode .pname-cell.pi2,
body.team-mode .pname-cell.pi3 { background: rgba(0,229,255,0.15); border-bottom: 2px solid #00e5ff; }

/* Takım renkleri - puan sütunları */
body.team-mode .score-cell.pi0,
body.team-mode .score-cell.pi1 {
  background: rgba(255,63,91,0.09) !important;
  border-left-color: rgba(255,63,91,0.5) !important;
  border-top-color: rgba(255,63,91,0.5) !important;
}
body.team-mode .score-cell.pi2,
body.team-mode .score-cell.pi3 {
  background: rgba(0,229,255,0.09) !important;
  border-left-color: rgba(0,229,255,0.5) !important;
  border-top-color: rgba(0,229,255,0.5) !important;
}
/* Takımlar arası kırmızı dikey çizgi */
body.team-mode .score-cell.pi1 {
  border-right: 2px solid rgba(233,69,96,0.85) !important;
  box-shadow: inset -3px 0 10px rgba(233,69,96,0.2) !important;
}
body.team-mode .pname-cell.pi1 {
  border-right: 2px solid rgba(233,69,96,0.85) !important;
}

/* Takım toplam satırı */
body.team-mode .total-cell.c0,
body.team-mode .total-cell.c1 { color: #ff3f5b; }
body.team-mode .total-cell.c2,
body.team-mode .total-cell.c3 { color: #00e5ff; }

/* Takım etiketi */
.team-tag {
  display: none;
  font-size: 0.5rem; font-weight: 800;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 1px 5px; border-radius: 4px;
}
body.team-mode .team-tag { display: block; }
.team-tag.red { background: rgba(255,63,91,0.3); color: #ff3f5b; }
.team-tag.blue { background: rgba(0,229,255,0.3); color: #00e5ff; }
.player-names { position: relative; z-index: 1;
  display: grid;
  grid-template-columns: 72px repeat(4, 1fr);
  background: rgba(45,27,94,0.75);
  border-bottom: 2px solid #ffd700;
  border-top: none;
}
.player-names .corner { background: transparent; }
.pname-cell {
  padding: 10px 4px 8px;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 5px;
  border-left: 2px solid rgba(255,215,0,0.2);
  text-align: center;
  position: relative;
}
.pname-cell.pi0 { border-top: 2px solid rgba(255,63,91,0.85); }
.pname-cell.pi1 { border-top: 2px solid rgba(255,140,0,0.85); }
.pname-cell.pi2 { border-top: 2px solid rgba(0,229,255,0.85); }
.pname-cell.pi3 { border-top: 2px solid rgba(0,255,148,0.85); }
.pname-dot {
  width: 9px; height: 9px; border-radius: 50%;
  display: block; margin: 0 auto;
}
.pname-input {
  width: 100%;
  background: transparent; border: none; outline: none;
  color: #fff; font-size: 14px; font-weight: 700;
  text-align: center;
  border-bottom: none;
  padding-bottom: 2px;
  display: block;
}
.pname-input::placeholder { color: rgba(255,255,255,0.3); font-weight: 400; text-align: center; }

/* ── Score rows ── */
.rounds-wrap { padding: 0; position: relative; z-index: 1; }

/* Tüm grid etrafı altın çerçeve */
.rounds-wrap {
  border-left: 1.5px solid rgba(255,215,0,0.15);
  border-right: 1.5px solid rgba(255,215,0,0.15);
}

.score-row {
  display: grid;
  grid-template-columns: 72px repeat(4, 1fr);
  border-bottom: 1px solid rgba(255,255,255,0.06);
  position: relative;
}
.score-row:nth-child(even) { background: rgba(255,255,255,0.018); }

/* İlk tur üstü — altın çizgi yok, player-names zaten var */
.score-row:first-child {
  border-top: none;
}
/* Son tur altı altın çizgi — JS ile eklenir */

.round-label-cell {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 6px 6px 8px;
  border-right: 2px solid rgba(255,215,0,0.3);
  background: rgba(0,0,0,0.1);
}
.round-num {
  font-size: 0.78rem; color: #c8a8ff; font-weight: 700;
  white-space: nowrap;
}
.del-btn {
  background: none; border: none; cursor: pointer;
  color: rgba(255,255,255,0.2); font-size: 0.85rem; padding: 2px 4px;
  border-radius: 4px; line-height: 1;
  transition: color 0.15s, background 0.15s;
  touch-action: manipulation;
}
.del-btn:active { color: #e94560; background: rgba(255,63,91,0.12); }

.score-cell {
  position: relative;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

/* Watermark player name */
.wm-label {
  position: absolute;
  inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem; font-weight: 800;
  letter-spacing: 0.08em; text-transform: uppercase;
  opacity: 0.18;
  pointer-events: none;
  overflow: hidden;
  white-space: nowrap;
}
.score-cell.pi0 .wm-label { color: #ff3f5b; }
.score-cell.pi1 .wm-label { color: #ff8c00; }
.score-cell.pi2 .wm-label { color: #00e5ff; }
.score-cell.pi3 .wm-label { color: #00ff94; }

/* Sütun — her iki yandan içe neon */
.score-cell.pi0 {
  border-left: 2px solid rgba(255,63,91,0.7);
  background: linear-gradient(to right, rgba(255,63,91,0.07) 0%, transparent 35%, transparent 65%, rgba(255,63,91,0.04) 100%);
  box-shadow: inset 3px 0 8px rgba(255,63,91,0.08), inset -3px 0 8px rgba(255,63,91,0.04);
}
.score-cell.pi1 {
  border-left: 2px solid rgba(255,140,0,0.7);
  background: linear-gradient(to right, rgba(255,140,0,0.07) 0%, transparent 35%, transparent 65%, rgba(255,140,0,0.04) 100%);
  box-shadow: inset 3px 0 8px rgba(255,140,0,0.08), inset -3px 0 8px rgba(255,140,0,0.04);
}
.score-cell.pi2 {
  border-left: 2px solid rgba(0,229,255,0.7);
  background: linear-gradient(to right, rgba(0,229,255,0.07) 0%, transparent 35%, transparent 65%, rgba(0,229,255,0.04) 100%);
  box-shadow: inset 3px 0 8px rgba(0,229,255,0.08), inset -3px 0 8px rgba(0,229,255,0.04);
}
.score-cell.pi3 {
  border-left: 2px solid rgba(0,255,148,0.7);
  background: linear-gradient(to right, rgba(0,255,148,0.07) 0%, transparent 35%, transparent 65%, rgba(0,255,148,0.04) 100%);
  box-shadow: inset 3px 0 8px rgba(0,255,148,0.08), inset -3px 0 8px rgba(0,255,148,0.04);
}

/* Son satır alt çizgisi */
.score-row:last-child {
  border-bottom: none;
}

.score-cell input {
  width: 100%; height: 100%; min-height: 54px;
  background: transparent; border: none; outline: none;
  color: #fff; font-size: 20px; font-weight: 800;
  text-align: center; position: relative; z-index: 1;
  -moz-appearance: textfield;
}
.score-cell input::-webkit-outer-spin-button,
.score-cell input::-webkit-inner-spin-button { -webkit-appearance: none; }
.score-cell input:focus { background: rgba(255,255,255,0.04); }
.score-cell input::placeholder { color: rgba(255,255,255,0.1); font-weight: 400; }

/* Lowest score highlight */
.cell-min input { color: #ffd700; font-weight: 800; }

/* ── Total row ── */
.total-row {
  display: grid;
  grid-template-columns: 72px repeat(4, 1fr);
  background: rgba(45,27,94,0.75);
  border-top: 2px solid #ffd700;
}
.total-label {
  padding: 12px 8px;
  font-size: 0.6rem; color: #9a8abb;
  text-transform: uppercase; letter-spacing: 0.1em;
  display: flex; align-items: center;
  border-right: 1px solid rgba(255,255,255,0.08);
}
.total-cell {
  padding: 12px 4px;
  text-align: center;
  border-left: 1px solid rgba(255,255,255,0.08);
  font-size: 1.4rem; font-weight: 900;
  display: flex; align-items: center; justify-content: center;
}

/* ── Add round button ── */
.add-wrap {
  padding: 14px 16px;
  display: flex; justify-content: center;
}
.add-btn {
  background: rgba(255,255,255,0.07);
  border: 1.5px dashed rgba(255,255,255,0.2);
  color: rgba(255,255,255,0.6);
  border-radius: 30px;
  padding: 10px 28px;
  font-size: 0.8rem; letter-spacing: 0.08em;
  cursor: pointer; touch-action: manipulation;
  transition: all 0.2s;
}
.add-btn:active { background: rgba(255,255,255,0.13); border-color: rgba(255,255,255,0.4); color: #fff; }

/* ── Leaderboard ── */
/* ── Takım skoru ── */
.team-score-section {
  display: none;
  margin: 0 12px 12px;
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #3d2070;
}
body.team-mode .team-score-section { display: flex; }

.team-score-box {
  flex: 1; padding: 14px 10px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  text-align: center;
}
.team-score-box.red  { background: rgba(255,63,91,0.12); border-right: 1px solid #0f3460; }
.team-score-box.blue { background: rgba(0,229,255,0.12); }

.team-score-title {
  font-size: 0.6rem; letter-spacing: 0.15em;
  text-transform: uppercase; font-weight: 700;
}
.team-score-box.red  .team-score-title { color: #ff3f5b; }
.team-score-box.blue .team-score-title { color: #00e5ff; }

.team-score-names { font-size: 0.65rem; color: #9a8abb; line-height: 1.5; }

.team-score-val { font-size: 2.2rem; font-weight: 900; line-height: 1; }
.team-score-box.red  .team-score-val { color: #ff3f5b; }
.team-score-box.blue .team-score-val { color: #00e5ff; }

.team-winner-tag {
  font-size: 0.55rem; background: #ffd700; color: #1a1a2e;
  padding: 2px 8px; border-radius: 10px; font-weight: 800;
  letter-spacing: 0.08em; display: none;
}
.team-winner-tag.show { display: block; }

.lb-section { position: relative; z-index: 1;
  margin: 0 12px 12px;
  background: rgba(26,10,62,0.75);
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #3d2070;
}
.lb-header {
  padding: 12px 16px;
  border-bottom: 1px solid #3d2070;
  font-size: 0.65rem; color: #9a8abb;
  text-transform: uppercase; letter-spacing: 0.15em;
  display: flex; align-items: center; justify-content: space-between;
}
.lb-note { color: #ffd700; font-size: 0.6rem; }

.lb-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.lb-item:last-child { border-bottom: none; }

.lb-medal { font-size: 1.1rem; min-width: 24px; text-align: center; }
.lb-medal.num { font-size: 0.85rem; color: #9a8abb; font-weight: 700; }

/* Daire gösterge */
.lb-circle {
  position: relative; width: 46px; height: 46px; flex-shrink: 0;
}
.lb-circle svg { position: absolute; inset: 0; transform: rotate(-90deg); }
.lb-circle-bg { fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 4; }
.lb-circle-fill { fill: none; stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.5s ease; }
.lb-circle-score {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.65rem; font-weight: 800;
}

.lb-info { flex: 1; min-width: 0; }
.lb-pname {
  font-size: 0.85rem; font-weight: 700;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lb-score-val { font-size: 1.05rem; font-weight: 800; min-width: 36px; text-align: right; }

.leader-badge {
  font-size: 0.5rem; background: #ffd700; color: #1a1a2e;
  padding: 1px 6px; border-radius: 10px; font-weight: 700;
  margin-left: 5px; letter-spacing: 0.05em; display: none;
  vertical-align: middle;
}
.leader-badge.show { display: inline; }

/* ── Kayıt sistemi ── */
.save-section { position: relative; z-index: 1;
  margin: 0 12px 12px;
  background: rgba(26,10,62,0.75);
  border-radius: 14px;
  overflow: hidden;
  border: 1px solid #3d2070;
}
.save-header {
  padding: 11px 16px;
  border-bottom: 1px solid #3d2070;
  font-size: 0.62rem; color: #9a8abb;
  text-transform: uppercase; letter-spacing: 0.15em;
  display: flex; align-items: center; gap: 8px;
}
.save-header span { color: #ffd700; }

.save-input-row {
  display: flex; gap: 8px; padding: 12px;
  border-bottom: 1px solid #3d2070;
}
.save-name-inp {
  flex: 1;
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px; padding: 9px 12px;
  color: #fff; font-size: 14px; outline: none;
}
.save-name-inp::placeholder { color: rgba(255,255,255,0.3); }
.save-name-inp:focus { border-color: #ffd700; }

.save-go-btn {
  background: rgba(255,215,0,0.15);
  border: 1.5px solid rgba(255,215,0,0.4);
  border-radius: 8px; padding: 9px 16px;
  color: #ffd700; font-size: 0.75rem; font-weight: 700;
  cursor: pointer; touch-action: manipulation;
  white-space: nowrap; transition: all 0.2s;
}
.save-go-btn:active { background: rgba(255,215,0,0.28); }

.saves-list { padding: 8px 0; }
.save-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  transition: background 0.15s;
}
.save-item:last-child { border-bottom: none; }
.save-item:active { background: rgba(255,255,255,0.05); }

<script>
var NAMES    = ['Oyuncu 1','Oyuncu 2','Oyuncu 3','Oyuncu 4'];
var MEDALS   = ['🥇','🥈','🥉','4.'];
var isLocked = true;
var isTeam   = false;
document.body.classList.add('locked');

var state = {
  names:  ['','','',''],
  rounds: 4,          // current round count
  scores: []          // scores[ri][pi]
};

// Init scores — boş başla

/* ── helpers ── */
function pv(v) { var n = parseFloat(String(v).replace(',','.')); return isNaN(n) ? null : n; }
function total(pi) {
  var s = 0;
  for (var ri = 0; ri < state.scores.length; ri++) { var v = pv(state.scores[ri][pi]); if (v !== null) s += v; }
  return s;
}
function pname(pi) { return (state.names[pi]||'').trim() || NAMES[pi]; }

/* ── Build player header ── */
function buildHeader() {
  var wrap = document.getElementById('player-names');
  wrap.innerHTML = '';
  var corner = document.createElement('div');
  corner.className = 'corner';
  corner.style.cssText = 'display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;';
  corner.innerHTML =
    '<button class="lock-btn ' + (isLocked ? 'locked' : 'unlocked') + '" id="lock-btn-top" style="position:static;transform:none;margin:0;">' +
      '<span class="lock-icon">' + (isLocked ? '🔒' : '✏️') + '</span>' +
      '<span class="lock-label">' + (isLocked ? 'Kilitli' : 'Düzenle') + '</span>' +
    '</button>' +
    '<button class="team-btn' + (isTeam ? ' on' : '') + '" id="team-btn" style="position:static;transform:none;margin:0;">' +
      '<span class="team-icon">' + (isTeam ? '🔴🔵' : '👥') + '</span>' +
      '<span class="team-label">' + (isTeam ? 'Takımlı' : 'Takımsız') + '</span>' +
    '</button>';
  wrap.appendChild(corner);

  // Kilit event
  document.getElementById('lock-btn-top').addEventListener('click', function(){
    isLocked = !isLocked;
    if (isLocked) {
      document.body.classList.add('locked');
      this.className = 'lock-btn locked'; this.style.cssText = 'position:static;transform:none;margin:0;';
      this.querySelector('.lock-icon').textContent = '🔒';
      this.querySelector('.lock-label').textContent = 'Kilitli';
    } else {
      document.body.classList.remove('locked');
      this.className = 'lock-btn unlocked'; this.style.cssText = 'position:static;transform:none;margin:0;';
      this.querySelector('.lock-icon').textContent = '✏️';
      this.querySelector('.lock-label').textContent = 'Düzenle';
    }
  });
  // Takım event
  document.getElementById('team-btn').addEventListener('click', function(){
    isTeam = !isTeam;
    if (isTeam) {
      document.body.classList.add('team-mode');
      this.className = 'team-btn on'; this.style.cssText = 'position:static;transform:none;margin:0;';
      this.querySelector('.team-icon').textContent = '🔴🔵';
      this.querySelector('.team-label').textContent = 'Takımlı';
    } else {
      document.body.classList.remove('team-mode');
      this.className = 'team-btn'; this.style.cssText = 'position:static;transform:none;margin:0;';
      this.querySelector('.team-icon').textContent = '👥';
      this.querySelector('.team-label').textContent = 'Takımsız';
    }
  });
  for (var pi = 0; pi < 4; pi++) {
    (function(pi){
      var cell = document.createElement('div');
      cell.className = 'pname-cell pi' + pi;
      var dot = document.createElement('div');
      dot.className = 'pname-dot bg' + pi;

      // Takım etiketi
      var tag = document.createElement('span');
      tag.className = 'team-tag ' + (pi < 2 ? 'red' : 'blue');
      tag.textContent = pi < 2 ? 'TAKIM 1' : 'TAKIM 2';

      var inp = document.createElement('input');
      inp.className   = 'pname-input';
      inp.type        = 'text';
      inp.placeholder = NAMES[pi];
      inp.value       = state.names[pi];
      inp.autocomplete = 'off';
      inp.addEventListener('input', function(){
        state.names[pi] = this.value;
        // update watermarks for this player column
        var nm = (state.names[pi]||'').trim() || NAMES[pi];
        document.querySelectorAll('.score-cell.pi' + pi).forEach(function(el){
          el.setAttribute('data-name', nm);
          // wm-label div'ini de güncelle
          var wm = el.querySelector('.wm-label');
          if (wm) wm.textContent = nm;
        });
        renderLb();
      });
      cell.appendChild(tag);
      cell.appendChild(dot); cell.appendChild(inp);
      wrap.appendChild(cell);
    })(pi);
  }
}

/* ── Build total row ── */
function buildTotalRow() {
  var row = document.getElementById('total-row');
  row.innerHTML = '<div class="total-label">Toplam</div>';
  for (var pi = 0; pi < 4; pi++) {
    var td = document.createElement('div');
    td.className = 'total-cell c' + pi;
    td.id = 'tot-' + pi;
    td.textContent = total(pi);
    row.appendChild(td);
  }
}

/* ── Refresh totals only ── */
function refreshTotals() {
  for (var pi = 0; pi < 4; pi++) {
    var el = document.getElementById('tot-' + pi);
    if (el) el.textContent = total(pi);
  }
}

/* ── Highlight lowest in row ── */
function hlRow(ri) {
  var vals = [0,1,2,3].map(function(pi){ return pv(state.scores[ri][pi]); });
  var filled = vals.filter(function(v){ return v !== null; });
  var minV = filled.length ? Math.min.apply(null, filled) : null;
  for (var pi = 0; pi < 4; pi++) {
    var cell = document.getElementById('sc-' + ri + '-' + pi);
    if (!cell) continue;
    var isMin = minV !== null && vals[pi] === minV;
    cell.className = 'score-cell pi' + pi + (isMin ? ' cell-min' : '');
  }
}

/* ── Build one score row ── */
function makeRow(ri, anim) {
  var row = document.createElement('div');
  row.className = 'score-row' + (anim ? ' new-row' : '');
  row.id = 'row-' + ri;

  var lc = document.createElement('div');
  lc.className = 'round-label-cell';
  var lbl = document.createElement('span');
  lbl.className = 'round-num';
  lbl.textContent = (ri+1) + '. Tur';
  var del = document.createElement('button');
  del.className = 'del-btn'; del.type = 'button'; del.textContent = '✕';
  del.addEventListener('click', (function(ri){ return function(){ deleteRound(ri); }; })(ri));
  lc.appendChild(lbl); lc.appendChild(del);
  row.appendChild(lc);

  for (var pi = 0; pi < 4; pi++) {
    (function(pi){
      var td = document.createElement('div');
      td.className = 'score-cell pi' + pi;
      td.id = 'sc-' + ri + '-' + pi;
      var nm = (state.names[pi]||'').trim() || NAMES[pi];
      td.setAttribute('data-name', nm);

      // Watermark div
      var wm = document.createElement('div');
      wm.className = 'wm-label';
      wm.textContent = nm;
      td.appendChild(wm);

      var inp = document.createElement('input');
      inp.type = 'number'; inp.inputMode = 'decimal';
      inp.placeholder = ''; inp.value = state.scores[ri][pi];
      inp.autocomplete = 'off';

      // Başlangıçta dolu mu?
      var v0 = String(state.scores[ri][pi]);
      if (v0 !== '' && v0 !== 'undefined') wm.style.display = 'none';

      inp.addEventListener('input', (function(wm, ri, pi){ return function(){
        state.scores[ri][pi] = this.value;
        wm.style.display = this.value !== '' ? 'none' : '';
        hlRow(ri); refreshTotals(); renderLb();
      }; })(wm, ri, pi));

      inp.addEventListener('keydown', (function(ri,pi){ return function(e){
        if (e.key !== 'Enter') return;
        e.preventDefault();
        if (this.value === '') { this.blur(); return; }
        if (!confirm('Emin misin baba? 🤔')) {
          this.value = state.scores[ri][pi] = '';
          hlRow(ri); refreshTotals(); renderLb();
        }
        this.blur();
      }; })(ri,pi));
      td.appendChild(inp); row.appendChild(td);
    })(pi);
  }
  return row;
}

/* ── Build all rows ── */
function buildRows() {
  var wrap = document.getElementById('rounds-wrap');
  wrap.innerHTML = '';
  for (var ri = 0; ri < state.scores.length; ri++) {
    wrap.appendChild(makeRow(ri, false));
    hlRow(ri);
  }
}

/* ── Delete round ── */
function deleteRound(ri) {
  if (state.scores.length <= 1) { alert('En az bir tur olmalı!'); return; }
  state.scores.splice(ri, 1);
  buildRows(); refreshTotals(); renderLb();
}

/* ── Add round ── */
document.getElementById('add-btn').addEventListener('click', function(){
  var ri = state.scores.length;
  state.scores.push(['','','','']);
  var wrap = document.getElementById('rounds-wrap');
  wrap.appendChild(makeRow(ri, true));
  hlRow(ri);
  refreshTotals(); renderLb();
  // scroll into view
  var el = document.getElementById('row-' + ri);
  if (el) el.scrollIntoView({ behavior:'smooth', block:'nearest' });
});

/* ── Leaderboard ── */
/* ── Takım skoru güncelle ── */
function updateTeamScores() {
  var t1 = total(0) + total(1);
  var t2 = total(2) + total(3);
  document.getElementById('team-score-red').textContent  = t1;
  document.getElementById('team-score-blue').textContent = t2;
  document.getElementById('team-names-red').innerHTML  = pname(0) + '<br>' + pname(1);
  document.getElementById('team-names-blue').innerHTML = pname(2) + '<br>' + pname(3);
  var hasAny = state.scores.some(function(r){ return r.some(function(v){ return v !== ''; }); });
  document.getElementById('team-winner-red').className  = 'team-winner-tag' + (hasAny && t1 < t2 ? ' show' : '');
  document.getElementById('team-winner-blue').className = 'team-winner-tag' + (hasAny && t2 < t1 ? ' show' : '');
}

function renderLb() {
  updateTeamScores();
  var list = document.getElementById('lb-list');
  list.innerHTML = '';
  var totals = [0,1,2,3].map(function(pi){ return total(pi); });
  var hasAny = state.scores.some(function(r){ return r.some(function(v){ return v !== ''; }); });
  var sorted = [0,1,2,3].map(function(pi){ return {pi:pi, t:totals[pi]}; })
    .sort(function(a,b){ return a.t - b.t; });
  var COLORS = ['#ff3f5b','#ff8c00','#00e5ff','#00ff94'];

  // Sol liste
  sorted.forEach(function(item, rank){
    var pi = item.pi, t = item.t;
    var isFirst = hasAny && rank === 0;
    var div = document.createElement('div');
    div.className = 'lb-item';
    var med = document.createElement('div');
    med.className = rank < 3 ? 'lb-medal' : 'lb-medal num';
    med.textContent = MEDALS[rank] || (rank+1)+'.';
    var nm = document.createElement('div');
    nm.className = 'lb-pname c' + pi;
    nm.style.cssText = 'flex:1; min-width:0;';
    nm.textContent = pname(pi);
    var badge = document.createElement('span');
    badge.className = 'leader-badge' + (isFirst ? ' show' : '');
    badge.textContent = 'LİDER';
    nm.appendChild(badge);
    var sv = document.createElement('div');
    sv.className = 'lb-score-val c' + pi;
    sv.textContent = t;
    div.appendChild(med); div.appendChild(nm); div.appendChild(sv);
    list.appendChild(div);
  });

  // Pasta grafik
  var canvas = document.getElementById('pie-chart');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 120, 120);
  var grandTotal = totals.reduce(function(a,b){ return a + Math.max(b,0); }, 0);
  if (!hasAny || grandTotal === 0) {
    // Boş halka
    ctx.beginPath(); ctx.arc(60,60,50,0,2*Math.PI);
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 18; ctx.stroke();
    return;
  }
  var startAngle = -Math.PI / 2;
  [0,1,2,3].forEach(function(pi){
    var val = Math.max(totals[pi], 0);
    var slice = (val / grandTotal) * 2 * Math.PI;
    ctx.beginPath();
    ctx.moveTo(60, 60);
    ctx.arc(60, 60, 50, startAngle, startAngle + slice);
    ctx.closePath();
    ctx.fillStyle = COLORS[pi];
    ctx.globalAlpha = 0.85;
    ctx.fill();
    ctx.globalAlpha = 1;
    // İnce ayırıcı
    ctx.strokeStyle = '#12022e'; ctx.lineWidth = 2; ctx.stroke();
    startAngle += slice;
  });
  // Ortada delik
  ctx.beginPath(); ctx.arc(60,60,28,0,2*Math.PI);
  ctx.fillStyle = '#1a0a3e'; ctx.fill();
}

/* ── Kayıt sistemi ── */
function getSaves() {
  try { return JSON.parse(localStorage.getItem('yazboz_saves') || '[]'); } catch(e) { return []; }
}
function setSaves(saves) {
  localStorage.setItem('yazboz_saves', JSON.stringify(saves));
}

function renderSaves() {
  var list = document.getElementById('saves-list');
  var saves = getSaves();
  list.innerHTML = '';
  if (saves.length === 0) {
    list.innerHTML = '<div class="no-saves">Henüz kayıt yok</div>';
    return;
  }
  saves.slice().reverse().forEach(function(save, idx) {
    var realIdx = saves.length - 1 - idx;
    var item = document.createElement('div');
    item.className = 'save-item';

    var info = document.createElement('div');
    info.className = 'save-item-info';
    var nm = document.createElement('div');
    nm.className = 'save-item-name';
    nm.textContent = save.label;
    var dt = document.createElement('div');
    dt.className = 'save-item-date';
    dt.textContent = save.date;
    info.appendChild(nm); info.appendChild(dt);

    var loadBtn = document.createElement('button');
    loadBtn.className = 'load-btn';
    loadBtn.textContent = '📂 Yükle';
    loadBtn.addEventListener('click', (function(s){ return function(){
      if (!confirm('"' + s.label + '" oyununu yüklemek istiyor musun?')) return;
      state.names  = s.names;
      state.scores = s.scores;
      // Takım modunu geri yükle
      isTeam = !!s.isTeam;
      var btn = document.getElementById('team-btn');
      if (isTeam) {
        document.body.classList.add('team-mode');
        btn.className = 'team-btn on';
        btn.querySelector('.team-icon').textContent = '🔴🔵';
        btn.querySelector('.team-label').textContent = 'Takımlı';
      } else {
        document.body.classList.remove('team-mode');
        btn.className = 'team-btn';
        btn.querySelector('.team-icon').textContent = '👥';
        btn.querySelector('.team-label').textContent = 'Takımsız';
      }
      buildHeader();
      buildRows();
      buildTotalRow();
      renderLb();
    }; })(save));

    var delBtn = document.createElement('button');
    delBtn.className = 'del-save-btn';
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', (function(saveLabel, saveDate){ return function(){
      if (!confirm('Bu kaydı silmek istiyor musun?')) return;
      var sv = getSaves();
      var idx = sv.findIndex(function(s){ return s.label === saveLabel && s.date === saveDate; });
      if (idx !== -1) { sv.splice(idx, 1); setSaves(sv); }
      renderSaves();
    }; })(save.label, save.date));

    item.appendChild(info);

var chartOpen = false;

document.getElementById('chart-toggle-btn').addEventListener('click', function(){
  chartOpen = !chartOpen;

  document.getElementById('chart-toggle-icon').textContent = chartOpen ? '▲' : '▼';

function renderChart() {
  var section = document.getElementById('chart-section');
  var hasAny  = state.scores.some(function(r){ return r.some(function(v){ return v !== ''; }); });
  if (!hasAny) { section.style.display = 'none'; return; }
  section.style.display = 'block';
  if (!chartOpen) return;

  var canvas = document.getElementById('game-chart');
  var W = canvas.offsetWidth || 320;
  var H = 160;
  canvas.width  = Math.round(W * window.devicePixelRatio);
  canvas.height = Math.round(H * window.devicePixelRatio);
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  var ctx2 = canvas.getContext('2d');
  ctx2.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx2.clearRect(0, 0, W, H);

  var COLORS2 = ['#ff3f5b','#ff8c00','#00e5ff','#00ff94'];
  var PAD = { top:12, right:16, bottom:24, left:32 };
  var cW = W - PAD.left - PAD.right;
  var cH = H - PAD.top  - PAD.bottom;

  var cumul = [[0,0,0,0]];
  state.scores.forEach(function(row){
    var prev = cumul[cumul.length-1];
    cumul.push([0,1,2,3].map(function(pi){
      var v = pv(row[pi]);
      return prev[pi] + (v !== null ? v : 0);
    }));
  });

  var allVals = [].concat.apply([], cumul);
  var minV = Math.min.apply(null, allVals);
  var maxV = Math.max.apply(null, allVals);
  if (minV === maxV) { maxV = minV + 1; }

  function px(xi) { return PAD.left + (xi / (cumul.length - 1)) * cW; }
  function py(v)  { return PAD.top  + (1 - (v - minV)/(maxV - minV)) * cH; }

  // Izgara
  ctx2.strokeStyle = 'rgba(255,255,255,0.05)';
  ctx2.lineWidth = 1;
  for (var gi=0; gi<=4; gi++) {
    var gy = PAD.top + (gi/4)*cH;
    ctx2.beginPath(); ctx2.moveTo(PAD.left, gy); ctx2.lineTo(PAD.left+cW, gy); ctx2.stroke();
  }

  ctx2.fillStyle = 'rgba(255,255,255,0.3)';
  ctx2.font = '9px sans-serif'; ctx2.textAlign = 'right';
  [0,0.5,1].forEach(function(t){
    var val = Math.round(minV + t*(maxV-minV));
    ctx2.fillText(val, PAD.left-4, PAD.top + (1-t)*cH + 3);
  });

  [0,1,2,3].forEach(function(pi){
    ctx2.save();
    ctx2.beginPath();
    for (var xi=0; xi<cumul.length; xi++) {
      var x = px(xi), y = py(cumul[xi][pi]);
      if (xi===0) ctx2.moveTo(x,y); else ctx2.lineTo(x,y);
    }
    ctx2.strokeStyle = COLORS2[pi];
    ctx2.lineWidth = 2; ctx2.lineJoin = 'round'; ctx2.stroke();
    var lx = px(cumul.length-1), ly = py(cumul[cumul.length-1][pi]);
    ctx2.beginPath(); ctx2.arc(lx, ly, 3.5, 0, Math.PI*2);
    ctx2.fillStyle = COLORS2[pi]; ctx2.fill();
    ctx2.restore();
  });

  ctx2.fillStyle = 'rgba(255,255,255,0.25)';
  ctx2.font = '9px sans-serif'; ctx2.textAlign = 'center';
  for (var xi2=1; xi2<cumul.length; xi2++) {
    if (cumul.length <= 8 || xi2 % Math.ceil((cumul.length-1)/6) === 0 || xi2 === cumul.length-1) {
      ctx2.fillText(xi2, px(xi2), H - PAD.bottom + 12);
    }
  }
}

/* ── Çarkıfelek ── */
var wheelAngle    = 0;
var wheelSpinning = false;
var wheelItems    = [];
var wheelLastTickIndex = -1;
var WHEEL_COLORS  = ['#8b1a6b','#4a1080','#1a3a7a','#6b2020','#1a6b4a',
                     '#7a4010','#5a0a5a','#0a4a6a','#6a5a00','#3a0a5a',
                     '#6b0a2a','#0a5a3a'];

function wheelNorm(a) {
  var two = Math.PI * 2;
  return ((a % two) + two) % two;
}
function wheelCurrentIndex(angle) {
  if (!wheelItems.length) return -1;
  var n = wheelItems.length;
  var sl = (Math.PI * 2) / n;
  var rel = wheelNorm((Math.PI * 1.5) - angle);
  return Math.floor(rel / sl) % n;
}
function wheelPointerTickFx() {
  var p = document.querySelector('.wheel-pointer');
  if (!p) return;
  p.classList.remove('tick');
  void p.offsetWidth;
  p.classList.add('tick');
  setTimeout(function(){ p.classList.remove('tick'); }, 120);
}
function wheelHaptic(speed) {
  wheelPointerTickFx();
  if (navigator.vibrate) {
    navigator.vibrate(speed > 0.03 ? 8 : 14);
  }
}

/* -- Çark çiz -- */
function drawWheel(hlIdx, angle) {
  var canvas = document.getElementById('wheel-canvas');
  var ctx3   = canvas.getContext('2d');
  var cx=130, cy=130, R=118, S=260;
  ctx3.clearRect(0,0,S,S);
  if (wheelItems.length === 0) {
    ctx3.fillStyle='rgba(255,255,255,0.06)';
    ctx3.beginPath(); ctx3.arc(cx,cy,R,0,Math.PI*2); ctx3.fill();
    ctx3.strokeStyle='rgba(255,255,255,0.1)'; ctx3.lineWidth=2;
    ctx3.beginPath(); ctx3.arc(cx,cy,R,0,Math.PI*2); ctx3.stroke();
    ctx3.fillStyle='#9a8abb'; ctx3.font='14px sans-serif'; ctx3.textAlign='center';
    ctx3.fillText('Seçenek ekle 👇', cx, cy+5); return;
  }
  var n = wheelItems.length;
  var slice = (Math.PI*2)/n;
  for (var i=0; i<n; i++) {
    var startA = angle + i*slice, endA = startA + slice;
    var isHL   = (hlIdx === i);
    ctx3.beginPath(); ctx3.moveTo(cx,cy); ctx3.arc(cx,cy,R,startA,endA); ctx3.closePath();
    ctx3.fillStyle = WHEEL_COLORS[i % WHEEL_COLORS.length];
    ctx3.globalAlpha = isHL ? 1 : 0.82; ctx3.fill();
    ctx3.strokeStyle = '#0d0120'; ctx3.lineWidth = 1.5; ctx3.stroke();
    ctx3.globalAlpha = 1;
    // Yazı
    ctx3.save(); ctx3.translate(cx,cy); ctx3.rotate(startA + slice/2);
    ctx3.textAlign = 'right';
    ctx3.fillStyle = isHL ? '#ffd700' : 'rgba(255,255,255,0.92)';
    ctx3.font = isHL ? 'bold 13px sans-serif' : '12px sans-serif';
    var lbl = wheelItems[i].length > 15 ? wheelItems[i].slice(0,14)+'…' : wheelItems[i];
    ctx3.fillText(lbl, R-9, 4.5);
    ctx3.restore();
    // Nokta
    var dotR = R * 0.88;
    var dotA = startA + slice/2;
    ctx3.beginPath(); ctx3.arc(cx + Math.cos(dotA)*dotR, cy + Math.sin(dotA)*dotR, 3, 0, Math.PI*2);
    ctx3.fillStyle = 'rgba(255,255,255,0.3)'; ctx3.fill();
  }
  // Dış çerçeve
  ctx3.beginPath(); ctx3.arc(cx,cy,R,0,Math.PI*2);
  ctx3.strokeStyle='rgba(255,215,0,0.5)'; ctx3.lineWidth=2.5; ctx3.stroke();
  // Merkez
  var cg = ctx3.createRadialGradient(cx,cy,0, cx,cy,20);
  cg.addColorStop(0,'#3a1080'); cg.addColorStop(1,'#0d0120');
  ctx3.beginPath(); ctx3.arc(cx,cy,20,0,Math.PI*2);
  ctx3.fillStyle=cg; ctx3.globalAlpha=1; ctx3.fill();
  ctx3.strokeStyle='#ffd700'; ctx3.lineWidth=2; ctx3.stroke();
  // Merkez nokta
  ctx3.beginPath(); ctx3.arc(cx,cy,5,0,Math.PI*2);
  ctx3.fillStyle='#ffd700'; ctx3.fill();
}

      h: 4 + Math.random()*4,
      rot: Math.random()*Math.PI,
      vx: (Math.random()-0.5)*4,
      vy: 3 + Math.random()*4,
      vr: (Math.random()-0.5)*0.2,
      col: cols[Math.floor(Math.random()*cols.length)],
      alpha: 1
    });
  }
  var frames = 0;
  function dropStep() {
    ctx4.clearRect(0,0,c.width,c.height);
    frames++;
    parts.forEach(function(p) {
      p.x  += p.vx; p.y += p.vy; p.rot += p.vr;
      if (frames > 80) p.alpha -= 0.018;
      ctx4.save();
      ctx4.globalAlpha = Math.max(0, p.alpha);
      ctx4.translate(p.x, p.y); ctx4.rotate(p.rot);
      ctx4.fillStyle = p.col;
      ctx4.fillRect(-p.w/2, -p.h/2, p.w, p.h);
      ctx4.restore();
    });
    if (parts.some(function(p){ return p.alpha > 0; })) {
      requestAnimationFrame(dropStep);
    } else {
      c.style.display = 'none';
    }
  }
  requestAnimationFrame(dropStep);
}

document.getElementById('wheel-spin-btn').addEventListener('click', function() {
  if (wheelItems.length < 2) { alert('En az 2 seçenek ekle!'); return; }
  if (wheelSpinning) return;

  wheelSpinning = true;
  var spinBtn = this;
  spinBtn.disabled = true;

  var res = document.getElementById('wheel-result');
  res.textContent = '';
  res.className = 'wheel-result';

  var startAngle = wheelAngle;
  // Tamamen rastgele: kaç tur ve ne kadar süre
  var totalSpin = (Math.PI * 2) * (8 + Math.random() * 12) + Math.random() * Math.PI * 2;
  var duration  = 3800 + Math.random() * 9200;
  var startTime = null;
  wheelLastTickIndex = wheelCurrentIndex(wheelAngle);

  function easeOut(t) { return 1 - Math.pow(1 - t, 4.2); }

  function spinStep(ts) {
    if (!startTime) startTime = ts;
    var t = Math.min((ts - startTime) / duration, 1);
    var prevAngle = wheelAngle;

    wheelAngle = startAngle + totalSpin * easeOut(t);

    var currentIndex = wheelCurrentIndex(wheelAngle);
    if (currentIndex !== wheelLastTickIndex) {
      wheelHaptic(Math.abs(wheelAngle - prevAngle));
      wheelLastTickIndex = currentIndex;
    }

    drawWheel(null, wheelAngle);

    if (t < 1) {
      requestAnimationFrame(spinStep);
    } else {
      // Nerede durduysa orada kalsın
      var n2   = wheelItems.length;
      var sl2  = (Math.PI * 2) / n2;
      var relA = ((Math.PI * 1.5 - wheelAngle) % (Math.PI * 2) + Math.PI * 2) % (Math.PI * 2);
      var finalIndex = Math.floor(relA / sl2) % n2;

      drawWheel(finalIndex, wheelAngle);
      setTimeout(function() {
        wheelPointerTickFx();
        if (navigator.vibrate) navigator.vibrate([16, 28, 18]);
      }, 35);
      wheelSpinning = false;
      spinBtn.disabled = false;
      res.textContent = '🎉 ' + wheelItems[finalIndex] + '!';
      res.className = 'wheel-result pop';
      launchConfetti();
    }
  }

  requestAnimationFrame(spinStep);
});

<script>
/* ── Takım Yıldızı Animasyonu ── */
(function(){
  var canvas = document.getElementById('bg-canvas');
  var ctx = canvas.getContext('2d');
  var W, H;

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  var purples = [[168,85,247],[192,132,252],[139,92,246],[109,40,217],[216,180,254]];
  var golds   = [[255,215,0],[255,193,7],[212,175,55]];

  var constellations = [
    // Büyükayı — 7 yıldız
    [[0,0],[30,-10],[60,0],[90,20],[70,50],[40,60],[10,40]],
    // Orion — 8 yıldız
    [[0,0],[20,-30],[50,-40],[30,0],[60,10],[80,-20],[50,30],[20,50]],
    // Haç
    [[0,-50],[0,50],[-50,0],[50,0],[0,0]],
    // Beş köşeli yıldız
    [[0,-60],[18,-20],[57,-20],[27,10],[38,50],[0,25],[-38,50],[-27,10],[-57,-20],[-18,-20]],
    // Üçgen + merkez
    [[0,-55],[50,30],[-50,30],[0,-55],[0,10]],
    // Kare + köşegen
    [[-40,-40],[40,-40],[40,40],[-40,40],[-40,-40],[40,40],[40,-40],[-40,40]],
    // Balık kuyruğu
    [[0,0],[30,-20],[60,0],[80,-30],[60,-10],[80,30],[60,10],[30,20],[0,0]],
    // Küçük ayı
    [[0,0],[25,10],[50,5],[70,20],[60,40],[35,45],[20,30]],
    // Sarmal
    [[0,0],[20,-15],[40,0],[35,25],[15,40],[-15,35],[-35,15],[-30,-15],[-10,-35],[20,-35]],
    // Elmas + kanatlar
    [[0,-50],[30,0],[0,50],[-30,0],[0,-50],[50,-20],[30,0],[50,20]],
  ];

  var groups = [];

  function Group(x, y, gen, inheritColor) {
    this.x = x !== undefined ? x : Math.random() * W;
    this.y = y !== undefined ? y : Math.random() * H;
    this.gen = gen || 0;
    var isGold = inheritColor ? false : Math.random() < 0.12;
    var palette = (inheritColor === 'gold' || isGold) ? golds : purples;
    this.colorType = (inheritColor === 'gold' || isGold) ? 'gold' : 'purple';
    var c = palette[Math.floor(Math.random()*palette.length)];
    this.r = c[0]; this.g = c[1]; this.b = c[2];
    this.template = constellations[Math.floor(Math.random()*constellations.length)];
    this.scale = 0;
    this.targetScale = 0.4 + Math.random() * 0.7;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.003;
    this.vx = (Math.random() - 0.5) * 0.25;
    this.vy = (Math.random() - 0.5) * 0.25;
    this.alpha = 0;
    this.targetAlpha = 0.15 + Math.random() * 0.25;
    this.life = 0;
    this.maxLife = 350 + Math.random() * 250;
    this.split = false;
    this.dying = false;
  }

  Group.prototype.getPoints = function() {
    var pts = [];
    for (var i=0; i<this.template.length; i++) {
      var tx = this.template[i][0] * this.scale;
      var ty = this.template[i][1] * this.scale;
      var cos = Math.cos(this.rot), sin = Math.sin(this.rot);
      pts.push({
        x: this.x + tx*cos - ty*sin,
        y: this.y + tx*sin + ty*cos
      });
    }
    return pts;
  };

  Group.prototype.draw = function() {
    var pts = this.getPoints();
    var a = this.alpha;
    // Bağlantı çizgileri
    ctx.beginPath();
    ctx.moveTo(pts[0].x, pts[0].y);
    for (var i=1; i<pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
    ctx.strokeStyle = 'rgba('+this.r+','+this.g+','+this.b+','+(a*0.35)+')';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // Yıldız noktaları
    for (var j=0; j<pts.length; j++) {
      var sz = j===0 ? 2.2 : 1.4;
      ctx.beginPath();
      ctx.arc(pts[j].x, pts[j].y, sz, 0, Math.PI*2);
      ctx.fillStyle = 'rgba('+this.r+','+this.g+','+this.b+','+a+')';
      ctx.fill();
      // Parlama
      var grd = ctx.createRadialGradient(pts[j].x, pts[j].y, 0, pts[j].x, pts[j].y, sz*4);
      grd.addColorStop(0, 'rgba('+this.r+','+this.g+','+this.b+','+(a*0.4)+')');
      grd.addColorStop(1, 'rgba('+this.r+','+this.g+','+this.b+',0)');
      ctx.beginPath();
      ctx.arc(pts[j].x, pts[j].y, sz*4, 0, Math.PI*2);
      ctx.fillStyle = grd; ctx.fill();
    }
  };

  Group.prototype.update = function() {
    this.life++;
    this.rot += this.rotSpeed;
    this.x   += this.vx;
    this.y   += this.vy;
    // Kenarda geri dön
    if (this.x < -100) this.x = W + 100;
    if (this.x > W+100) this.x = -100;
    if (this.y < -100) this.y = H + 100;
    if (this.y > H+100) this.y = -100;
    // Büyü
    if (this.scale < this.targetScale) this.scale += 0.004;
    // Fade in
    if (!this.dying && this.alpha < this.targetAlpha) this.alpha += 0.003;
    // Bölün
    if (!this.split && this.life > this.maxLife * 0.5 && groups.length < 18) {
      this.split = true;
      var off = 60 * this.targetScale;
      var angle = Math.random() * Math.PI * 2;
      for (var d=0; d<2; d++) {
        var a2 = angle + d * Math.PI;
        groups.push(new Group(
          this.x + Math.cos(a2)*off,
          this.y + Math.sin(a2)*off,
          this.gen + 1,
          this.colorType
        ));
      }
    }
    // Öl
    if (this.life > this.maxLife * 0.8) {
      this.dying = true;
      this.alpha -= 0.003;
    }
    return this.alpha > 0;
  };

  for (var i=0; i<5; i++) {
    var g = new Group();
    g.life = Math.random() * 120;
    groups.push(g);
  }

  var spawnTimer = 0;

  function animate() {
    ctx.clearRect(0,0,W,H);
    spawnTimer++;
    if (spawnTimer > 100 && groups.length < 18) {
      groups.push(new Group());
      spawnTimer = 0;
    }
    groups = groups.filter(function(g){
      var alive = g.update();
      if (alive) g.draw();
      return alive;
    });
    requestAnimationFrame(animate);
  }
  animate();
})();
</script>

      c.font = '24px serif';
      c.textAlign = 'left';
      c.fillStyle = '#fff';
      c.fillText(medals[i], 48, mid + 8);

      // İsim
      c.fillStyle = i === 0 ? '#ffd700' : 'rgba(255,255,255,0.88)';
      c.font = (i === 0 ? 'bold ' : '') + '21px Arial, sans-serif';
      c.fillText(p.name, 100, mid + 7);

      // Bar arka
      var barW = 140, barX = W - 110 - barW;
      c.save();
      rr(barX, mid - 8, barW, 16, 8);
      c.fillStyle = 'rgba(255,255,255,0.07)';
      c.fill();
      c.restore();

      // Bar dolgu
      var fillW = Math.max(10, (p.total / maxT) * barW);
      c.save();
      rr(barX, mid - 8, fillW, 16, 8);
      var bg2 = c.createLinearGradient(barX, 0, barX + fillW, 0);
      bg2.addColorStop(0, p.colorDim);
      bg2.addColorStop(1, p.color);
      c.fillStyle = bg2;
      c.fill();
      c.restore();

      // Puan
      c.fillStyle = p.color;
      c.font = 'bold 24px Arial, sans-serif';
      c.textAlign = 'right';
      c.fillText(p.total, W - 46, mid + 8);

      // Ayırıcı
      if (i < sorted.length - 1) {
        c.strokeStyle = 'rgba(255,255,255,0.05)';
        c.lineWidth = 1;
        c.beginPath();
        c.moveTo(46, y + rowH);
        c.lineTo(W - 46, y + rowH);
        c.stroke();
      }
    });

    // Slogan kutusu
    var sloY = cardY + cardH + 28;
    c.save(); rr(W/2 - 240, sloY, 480, 52, 26);
    c.fillStyle = 'rgba(255,215,0,0.1)'; c.fill();
    c.strokeStyle = 'rgba(255,215,0,0.45)'; c.lineWidth = 1.5; c.stroke();
    c.restore();
    c.fillStyle = '#ffd700'; c.font = 'bold 20px Arial, sans-serif'; c.textAlign = 'center';
    c.fillText(slogan, W/2, sloY + 33);

    // Tarih — büyük, altın, italik
    var dateStr = state.scores.length + ' tur  -  ' + new Date().toLocaleDateString('tr-TR', {day:'numeric', month:'long', year:'numeric'});
    c.fillStyle = '#ffd700';
    c.font = 'bold italic 42px Arial, sans-serif';
    c.fillText(dateStr, W/2, sloY + 108);

    // Alt logo
    c.fillStyle = 'rgba(100,70,180,0.55)';
    c.font = '12px Arial, sans-serif';
    c.fillText('MukoSanŞeker', W/2, H - 14);

    // Alt altın çizgi
    c.fillStyle = topGrad; c.fillRect(0, H - 3, W, 3);

    // Paylaş
    cv.toBlob(function(blob) {
      btn.textContent = '📤 Sonucu Paylaş';
      btn.disabled = false;
      if (!blob) { alert('Görsel oluşturulamadı.'); return; }
      var file = new File([blob], 'yazboz-skor.png', { type: 'image/png' });
      var shareText = slogan + '\n\n' + sorted.map(function(p, i){ return medals[i]+' '+p.name+': '+p.total; }).join('\n');
      if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
        navigator.share({ title: '🃏 Yaz Boz', text: shareText, files: [file] }).catch(function(){});
      } else if (navigator.share) {
        navigator.share({ title: '🃏 Yaz Boz', text: shareText }).catch(function(){});
      } else {
        var a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = 'yazboz-skor.png';
        a.click();
      }
    }, 'image/png');

  } catch(err) {
    btn.textContent = '📤 Sonucu Paylaş';
    btn.disabled = false;
    alert('Hata: ' + err.message);
  }
});
</script>
</body>
</html>
